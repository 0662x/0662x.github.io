---
layout: default
---

<style>
  :root {
    --bg: #0b0f14;
    --panel: rgba(255, 255, 255, 0.055);
    --text: #f3efe7;
    --muted: #a8b0bd;
    --soft: #737b89;
    --line: rgba(255, 255, 255, 0.12);
    --gold: #d8b56d;
    --blue: #8fb7ff;
  }

  body {
    background: linear-gradient(180deg, #0d1117 0%, var(--bg) 42%, #080b0f 100%);
    color: var(--text);
  }

  .site-header,
  .site-footer {
    display: none;
  }

  .page-content {
    padding: 0;
  }

  .wrapper {
    max-width: 980px;
    padding-left: 24px;
    padding-right: 24px;
  }

  a {
    color: inherit;
  }

  .post-shell {
    padding: 42px 0 88px;
  }

  .top-nav {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 68px;
    color: var(--muted);
    font-size: 14px;
  }

  .top-nav a {
    color: inherit;
    text-decoration: none;
  }

  .top-nav a:hover {
    color: var(--text);
  }

  .post-hero {
    border-bottom: 1px solid var(--line);
    margin-bottom: 42px;
    padding-bottom: 34px;
  }

  .post-meta {
    color: var(--gold);
    font-size: 13px;
    margin-bottom: 18px;
  }

  .post-title {
    font-size: 56px;
    line-height: 1.06;
    letter-spacing: 0;
    margin: 0 0 20px;
  }

  .post-description {
    color: var(--muted);
    font-size: 18px;
    line-height: 1.8;
    margin: 0;
    max-width: 780px;
  }

  .post-body {
    color: #d9dee7;
    font-size: 17px;
    line-height: 1.86;
  }

  .post-body h1,
  .post-body h2,
  .post-body h3,
  .post-body h4 {
    color: var(--text);
    letter-spacing: 0;
    line-height: 1.22;
    margin-top: 2.2em;
    margin-bottom: 0.7em;
  }

  .post-body h1 {
    font-size: 36px;
  }

  .post-body h2 {
    font-size: 28px;
  }

  .post-body h3 {
    font-size: 23px;
  }

  .post-body p {
    margin: 1.1em 0;
  }

  .post-body a {
    color: var(--blue);
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  .post-body blockquote {
    border-left: 3px solid var(--gold);
    color: var(--muted);
    margin: 1.6em 0;
    padding: 0.2em 0 0.2em 1.1em;
  }

  .post-body code {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    color: #fff6d8;
    font-size: 0.92em;
    padding: 0.1em 0.35em;
  }

  .post-body pre {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow-x: auto;
    padding: 18px;
  }

  .post-body pre code {
    background: transparent;
    border: 0;
    color: #edf2f7;
    padding: 0;
  }

  .post-body table {
    border-collapse: collapse;
    display: block;
    margin: 1.6em 0;
    overflow-x: auto;
    width: 100%;
  }

  .post-body th,
  .post-body td {
    border: 1px solid var(--line);
    padding: 10px 12px;
    vertical-align: top;
  }

  .post-body th {
    background: rgba(255, 255, 255, 0.075);
    color: var(--text);
  }

  .post-body hr {
    border: 0;
    border-top: 1px solid var(--line);
    margin: 2.4em 0;
  }

  @media (max-width: 700px) {
    .wrapper {
      padding-left: 18px;
      padding-right: 18px;
    }

    .post-shell {
      padding-top: 28px;
    }

    .top-nav {
      margin-bottom: 42px;
    }

    .post-title {
      font-size: 34px;
      line-height: 1.12;
    }

    .post-description {
      font-size: 16px;
    }

    .post-body {
      font-size: 16px;
    }
  }
</style>

<article class="post-shell">
  <nav class="top-nav">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/archive/' | relative_url }}">Archive</a>
  </nav>

  <header class="post-hero">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% if page.categories %}
        · {{ page.categories | join: ", " }}
      {% endif %}
    </div>

    <h1 class="post-title">{{ page.title }}</h1>

    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
